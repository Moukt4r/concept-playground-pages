<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Playground ready</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: ui-sans-serif, system-ui, sans-serif;
        background: #0d1117;
        color: #e6edf3;
      }

      body {
        display: grid;
        min-height: 100vh;
        margin: 0;
        place-items: center;
      }

      main {
        max-width: 36rem;
        padding: 3rem;
        text-align: center;
      }

      .mark {
        display: inline-grid;
        width: 4rem;
        height: 4rem;
        border-radius: 1.25rem;
        background: linear-gradient(135deg, #2f81f7, #a371f7);
        font-size: 2rem;
        font-weight: 800;
        place-items: center;
      }

      h1 {
        margin-bottom: 0.75rem;
        font-size: clamp(2rem, 8vw, 4rem);
      }

      p {
        color: #8b949e;
        font-size: 1.1rem;
        line-height: 1.6;
      }

      a {
        color: #58a6ff;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="mark" aria-hidden="true">P</div>
      <h1>Playground ready</h1>
      <p>
        This artifact was assembled and deployed by GitHub Actions.
        <a href="../../">Return to the artifact index</a>.
      </p>
